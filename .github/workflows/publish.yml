name: Publish to PyPI

# Publishes the package whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) -- no API token is stored in the repo.
# One-time setup on PyPI: https://pypi.org/manage/account/publishing/
#   Project: ragloop-agentic
#   Owner:   jaesungl33   Repo: ragloop
#   Workflow: publish.yml   Environment: pypi

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ragloop-agentic
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
